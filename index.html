<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Companion</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="app">

      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Chats</span>
          <button class="icon-button" id="newCharacterButton" aria-label="New character" title="New character">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
        <div class="sidebar-list" id="sidebarList">
          <!-- character rows injected by JS -->
        </div>
      </aside>

      <!-- MAIN CHAT SHELL -->
      <main class="shell" id="shell" aria-label="AI companion chat shell">

        <!-- TOPBAR -->
        <header class="topbar">
          <div class="topbar-left">
            <button class="icon-button" id="backButton" aria-label="Back to chats" style="display:none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
            <div class="topbar-character" id="topbarCharacter">
              <div class="avatar-circle" id="topbarAvatar">?</div>
              <div class="brand">
                <div class="brand-name" id="aiName">Select a chat</div>
                <div class="brand-subtitle">Personal companion</div>
              </div>
            </div>
          </div>
          <button class="icon-button" id="profileButton" aria-label="User profile">
            <div class="avatar-circle small" id="userAvatarButton">?</div>
          </button>
        </header>

        <!-- CHAT AREA -->
        <section class="chat-wrap">
          <div class="chat-area" id="chatArea" aria-live="polite">
            <div class="messages" id="messages"></div>
          </div>
        </section>

        <!-- COMPOSER -->
        <form class="composer" id="composer" autocomplete="off">
          <div class="composer-inner">
            <textarea
              class="input"
              id="messageInput"
              rows="1"
              placeholder="Type a message..."
              aria-label="Message input"
            ></textarea>
            <button class="send-button" id="sendButton" type="submit">Send</button>
          </div>
        </form>

        <!-- USER PROFILE PANEL -->
        <div class="panel" id="profilePanel" aria-hidden="true">
          <div class="panel-card">
            <div class="settings-header">
              <h2 class="settings-title">My Profile</h2>
              <button class="icon-button" id="closeProfileButton" aria-label="Close profile">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            <form id="userForm" class="character-form">
              <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="userDisplayName" placeholder="What should Mara call you?" />
              </div>
              <div class="form-group">
                <label>Avatar</label>
                <input type="file" id="userAvatar" accept="image/*" />
                <img id="userAvatarPreview" style="display:none; width:64px; height:64px; border-radius:50%; margin-top:8px; object-fit:cover;" />
              </div>
              <div class="form-group">
                <label>About Me</label>
                <textarea id="userAbout" placeholder="A little about yourself..."></textarea>
              </div>
              <div class="form-group">
                <label>Timezone</label>
                <input type="text" id="userTimezone" placeholder="e.g. Asia/Jakarta" />
              </div>
              <button type="submit" class="save-button">Save Profile</button>
              <div id="userSaveStatus"></div>
            </form>
          </div>
        </div>

        <!-- CHARACTER PANEL (new / edit) -->
        <div class="panel" id="characterPanel" aria-hidden="true">
          <div class="panel-card">
            <div class="settings-header">
              <h2 class="settings-title" id="characterPanelTitle">New Character</h2>
              <button class="icon-button" id="closeCharacterButton" aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            <form id="characterForm" class="character-form">
              <input type="hidden" id="characterId" />
              <div class="form-group">
                <label>Avatar</label>
                <input type="file" id="characterAvatar" accept="image/*" />
                <img id="avatarPreview" style="display:none; width:64px; height:64px; border-radius:50%; margin-top:8px; object-fit:cover;" />
              </div>
              <div class="form-group">
                <label>Name</label>
                <input type="text" id="characterName" />
              </div>
              <div class="form-group">
                <label>Birthday</label>
                <input type="date" id="characterBirthday" />
              </div>
              <div class="form-group">
                <label>Relationship</label>
                <input type="text" id="characterRelationship" />
              </div>
              <div class="form-group">
                <label>Personality Traits</label>
                <textarea id="characterPersonality"></textarea>
              </div>
              <div class="form-group">
                <label>Speaking Style</label>
                <textarea id="characterSpeaking"></textarea>
              </div>
              <div class="form-group">
                <label>Interests</label>
                <textarea id="characterInterests"></textarea>
              </div>
              <div class="form-group">
                <label>Notes & Backstory</label>
                <textarea id="characterBackstory" class="large-textarea"></textarea>
              </div>
              <button type="submit" class="save-button">Save Character</button>
              <div id="saveStatus"></div>
            </form>
          </div>
        </div>

      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js" defer></script>
  </body>
</html>
